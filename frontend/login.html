<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Admin Login - LNMIIT Health Center</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-high": "#e6e8ea",
            "secondary": "#505f76",
            "surface-dim": "#d8dadc",
            "on-secondary-fixed-variant": "#38485d",
            "surface-container-low": "#f2f4f6",
            "inverse-primary": "#6bd8cb",
            "surface-tint": "#006a61",
            "surface-container": "#eceef0",
            "inverse-surface": "#2d3133",
            "on-tertiary": "#ffffff",
            "on-error-container": "#93000a",
            "on-secondary-fixed": "#0b1c30",
            "on-secondary": "#ffffff",
            "tertiary-fixed-dim": "#ffb59a",
            "tertiary-container": "#b05e3d",
            "inverse-on-surface": "#eff1f3",
            "on-surface": "#191c1e",
            "error-container": "#ffdad6",
            "error": "#ba1a1a",
            "primary-fixed": "#89f5e7",
            "on-error": "#ffffff",
            "on-tertiary-fixed-variant": "#773215",
            "surface": "#f7f9fb",
            "surface-container-lowest": "#ffffff",
            "on-surface-variant": "#3d4947",
            "primary-fixed-dim": "#6bd8cb",
            "on-background": "#191c1e",
            "outline-variant": "#bcc9c6",
            "tertiary-fixed": "#ffdbce",
            "background": "#f7f9fb",
            "surface-container-highest": "#e0e3e5",
            "on-primary-fixed": "#00201d",
            "surface-bright": "#f7f9fb",
            "on-primary-fixed-variant": "#005049",
            "secondary-fixed-dim": "#b7c8e1",
            "primary-container": "#008378",
            "outline": "#6d7a77",
            "on-secondary-container": "#54647a",
            "primary": "#00685f",
            "secondary-container": "#d0e1fb",
            "secondary-fixed": "#d3e4fe",
            "on-tertiary-container": "#fffbff",
            "on-primary-container": "#f4fffc",
            "on-primary": "#ffffff",
            "on-tertiary-fixed": "#370e00",
            "tertiary": "#924628",
            "surface-variant": "#e0e3e5"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "lg": "40px",
            "margin-mobile": "16px",
            "xs": "4px",
            "sm": "12px",
            "margin-desktop": "48px",
            "base": "8px",
            "gutter": "24px",
            "xl": "64px",
            "md": "24px"
          },
          "fontSize": {
            "label-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500"}],
            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
            "label-md": ["15px", {"lineHeight": "22px", "letterSpacing": "0.01em", "fontWeight": "600"}],
            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
  
  <style>
    body {
      background-color: #F8FAFC;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
    }
    .login-card-shadow {
      box-shadow: 0px 4px 12px rgba(30, 41, 59, 0.05);
    }
    .focus-glow:focus {
      outline: none;
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.2);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .animate-shake {
      animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-margin-mobile md:p-0">

  <main class="w-full max-w-[440px] animate-in fade-in zoom-in duration-500">
    <!-- Login Card -->
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg login-card-shadow">
      
      <!-- Brand Logo & Header -->
      <div class="flex flex-col items-center mb-xl">
        <div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-md text-on-primary-container">
          <span class="material-symbols-outlined text-[32px]">medical_services</span>
        </div>
        <h1 class="font-headline-md text-headline-md text-on-surface mb-xs text-center">LNMIIT Health Center</h1>
        <p class="font-body-sm text-body-sm text-secondary">Administrative Staff Portal</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-md">
        <div class="space-y-xs">
          <label for="username" class="font-label-md text-label-md text-on-surface-variant block">Username</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">person</span>
            <input 
              type="text" 
              id="username" 
              name="username"
              required
              placeholder="admin"
              class="w-full pl-lg pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-outline focus-glow transition-all"
            >
          </div>
        </div>

        <div class="space-y-xs">
          <label for="password" class="font-label-md text-label-md text-on-surface-variant block">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock</span>
            <input 
              type="password" 
              id="password" 
              name="password"
              required
              placeholder="••••••••"
              class="w-full pl-lg pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-outline focus-glow transition-all"
            >
          </div>
        </div>

        <div class="flex justify-end py-xs">
          <a href="index.html" class="font-label-sm text-label-sm text-[#0d9488] hover:underline transition-all">← Back to Dashboard</a>
        </div>

        <button 
          type="submit" 
          id="submitBtn"
          class="w-full bg-[#00685f] hover:bg-[#008378] text-white font-semibold py-3 rounded-lg transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2"
        >
          <span id="btnText">Login</span>
          <span id="btnLoader" class="hidden animate-spin material-symbols-outlined">progress_activity</span>
        </button>

        <!-- Error Alert Box -->
        <div id="errorAlert" class="hidden animate-in slide-in-from-top-2 duration-300">
          <div class="bg-red-50 border border-red-200 p-3 rounded-lg flex items-start gap-3">
            <span class="material-symbols-outlined text-red-600 text-[20px] mt-0.5">error</span>
            <div class="flex-1">
              <p class="font-label-sm text-label-sm text-red-950 font-bold">Authentication Failed</p>
              <p class="font-body-sm text-body-sm text-red-900/80" id="errorText">The username or password you entered is incorrect. Please try again.</p>
            </div>
          </div>
        </div>
      </form>

    </div>
  </main>

  <!-- Background Decoration for Atmosphere -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-[#00685f]/5 rounded-full blur-[100px]"></div>
    <div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-[#505f76]/5 rounded-full blur-[100px]"></div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
