<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Specialists - LNMIIT Health Center</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>LNMIIT<br>Health Center</h2>
      </div>
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="doctors.html">All Doctors</a></li>
        <li><a href="add-doctor.html">Add Doctor</a></li>
        <li><a href="search.html" class="active">Search Specialists</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>Search by Specialization</h1>
          <p>Find the right doctor for your specific health needs.</p>
        </div>
      </header>

      <div class="form-container" style="max-width: 100%; margin-bottom: 2rem; padding: 1.5rem 2rem;">
        <div class="form-row" style="margin-bottom: 0;">
          <div class="form-group" style="flex: 2;">
            <label for="specializationFilter">Select Specialization</label>
            <select id="specializationFilter">
              <option value="" disabled selected>Choose a specialization...</option>
              <option value="General Physician">General Physician</option>
              <option value="Dentist">Dentist</option>
              <option value="ENT">ENT</option>
              <option value="Orthopedic">Orthopedic</option>
              <option value="Gynecologist">Gynecologist</option>
              <option value="Dermatologist">Dermatologist</option>
              <option value="Psychiatrist">Psychiatrist</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1; display: flex; align-items: flex-end;">
            <button id="searchBtn" class="btn btn-primary" style="width: 100%; justify-content: center;">Search Doctors</button>
          </div>
        </div>
      </div>

      <div id="loader" class="loader" style="display: none;"></div>
      
      <div id="resultsTitle" style="display: none; margin-bottom: 1.5rem;">
        <h3>Search Results</h3>
      </div>
      
      <div class="card-grid" id="searchResults">
        <!-- Results rendered by JS -->
      </div>
      
      <div id="noResultsState" class="empty-state" style="display: none; background-color: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color);">
        <h3>No matches found</h3>
        <p>There are currently no doctors registered with this specialization.</p>
      </div>

    </main>
  </div>

  <script src="js/search.js"></script>
</body>
</html>
