<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Doctor - LNMIIT Health Center</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>LNMIIT<br>Health Center</h2>
        <p style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.7); margin-top: 0.5rem; font-family: 'DM Sans', sans-serif; font-weight: 500;">Doctor Management Module</p>
      </div>
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="doctors.html">All Doctors</a></li>
        <li><a href="add-doctor.html" class="active">Add Doctor</a></li>
        <li><a href="search.html">Search Specialists</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>Add New Doctor</h1>
          <p>Fill out the details to register a new doctor in the system.</p>
        </div>
      </header>

      <div class="form-container">
        <form id="addDoctorForm">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Full Name *</label>
              <input type="text" id="name" name="name" required placeholder="e.g. Dr. Pranav Vashisth">
            </div>
            <div class="form-group">
              <label for="specialization">Specialization *</label>
              <select id="specialization" name="specialization" required>
                <option value="" disabled selected>Select Specialization</option>
                <option value="General Physician">General Physician</option>
                <option value="Dentist">Dentist</option>
                <option value="ENT">ENT</option>
                <option value="Orthopedic">Orthopedic</option>
                <option value="Gynecologist">Gynecologist</option>
                <option value="Dermatologist">Dermatologist</option>
                <option value="Psychiatrist">Psychiatrist</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="qualification">Qualification *</label>
              <input type="text" id="qualification" name="qualification" required placeholder="e.g. MBBS, MD">
            </div>
            <div class="form-group">
              <label for="experience">Experience (Years) *</label>
              <input type="number" id="experience" name="experience" min="0" required placeholder="e.g. 5">
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label>Available Days *</label>
            <div class="checkbox-group" id="daysGroup">
              <label class="checkbox-label"><input type="checkbox" name="days" value="Monday"> Monday</label>
              <label class="checkbox-label"><input type="checkbox" name="days" value="Tuesday"> Tuesday</label>
              <label class="checkbox-label"><input type="checkbox" name="days" value="Wednesday"> Wednesday</label>
              <label class="checkbox-label"><input type="checkbox" name="days" value="Thursday"> Thursday</label>
              <label class="checkbox-label"><input type="checkbox" name="days" value="Friday"> Friday</label>
              <label class="checkbox-label"><input type="checkbox" name="days" value="Saturday"> Saturday</label>
              <label class="checkbox-label"><input type="checkbox" name="days" value="Sunday"> Sunday</label>
            </div>
            <small id="daysError" class="text-danger" style="color: var(--danger-color); display: none; margin-top: 0.5rem;">Please select at least one available day.</small>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="consultationTimings">Consultation Timings *</label>
              <input type="text" id="consultationTimings" name="consultationTimings" required placeholder="e.g. 10:00 AM - 1:00 PM">
            </div>
            <div class="form-group">
              <label for="roomNumber">Room Number *</label>
              <input type="text" id="roomNumber" name="roomNumber" required placeholder="e.g. 105">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="contact">Contact Number *</label>
              <input type="text" id="contact" name="contact" required placeholder="e.g. +91 9876543210">
            </div>
            <div class="form-group">
              <label for="email">Email Address *</label>
              <input type="email" id="email" name="email" required placeholder="e.g. doctor@example.com">
            </div>
          </div>

          <div class="form-actions">
            <a href="doctors.html" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary" id="submitBtn">Add Doctor</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="js/add-doctor.js"></script>
</body>
</html>
